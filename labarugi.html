<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Laba Rugi</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
:root{
  --primary:#1e90ff;--primary-dark:#0f3057;--card:#fff;--bg:#f4f6f9;--text:#1f2937;
  --muted:#6b7280;--success:#16a34a;--danger:#dc2626;--border:#e2e8f0;
  --shadow:0 4px 15px rgba(0,0,0,0.08);--radius:16px;
}
body{background:var(--bg);padding:12px;color:var(--text);font-size:13px;}
.header{
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:white;padding:14px 16px;border-radius:var(--radius);
  display:flex;justify-content:space-between;align-items:center;
  box-shadow:var(--shadow);margin-bottom:16px;
}
.header-left{display:flex;align-items:center;gap:10px;}
.btn-back{
  background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);
  color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.header-title{font-weight:700;font-size:16px;}
.tanggal{font-size:11px;opacity:0.9;margin-top:2px;}
.btn-pdf{
  background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);
  color:#fff;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;
}
.card{
  background:var(--card);border-radius:var(--radius);padding:16px;
  margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--border);
}
.card h2{
  margin-bottom:12px;color:var(--primary-dark);font-size:15px;
  padding-bottom:10px;border-bottom:2px solid var(--primary);
}
.filter-group{display:flex;gap:8px;margin-bottom:14px;}
.filter-group select, .filter-group input{
  flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;
}
.row{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid #f1f5f9;font-size:13px;
}
.row:last-child{border-bottom:none;}
.row-label{color:var(--muted);}
.row-value{font-weight:600;color:var(--text);}
.row.subtotal{margin-top:6px;padding-top:10px;border-top:1px solid var(--border);font-weight:600;}
.row.total{
  margin-top:8px;padding-top:12px;border-top:2px solid var(--text);
  font-weight:700;font-size:15px;color:var(--primary-dark);
}
.row.indent{padding-left:20px;}
.shu-box{
  padding:14px;border-radius:12px;text-align:center;font-size:16px;
  font-weight:700;margin-top:8px;background:#dcfce7;color:#166534;border:1px solid #bbf7d0;
}
.shu-box.minus{background:#fee2e2;color:#991b1b;border-color:#fecaca;}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
        <div>
      <div class="header-title">LAPORAN LABA RUGI</div>
      <div class="tanggal" id="tglLaporan">Memuat...</div>
    </div>
  </div>
  <div class="header-actions">
        <button class="btn-back" onclick="kembali()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
  </div>
  </div>

<div class="card">
  <h2>Filter Periode</h2>
  <div class="filter-group">
    <select id="bulan">
      <option value="0">Januari</option><option value="1">Februari</option>
      <option value="2">Maret</option><option value="3">April</option>
      <option value="4">Mei</option><option value="5">Juni</option>
      <option value="6">Juli</option><option value="7">Agustus</option>
      <option value="8">September</option><option value="9">Oktober</option>
      <option value="10">November</option><option value="11">Desember</option>
    </select>
    <input type="number" id="tahun" placeholder="2025">
  </div>
</div>

<div class="card">
  <h2>💵 PENDAPATAN</h2>
  <div class="row indent">
    <span class="row-label">Jasa Pinjaman</span>
    <span class="row-value" id="jasaPinjaman">Rp 0</span>
  </div>
  <div class="row indent">
    <span class="row-label">Adm Anggota Baru</span>
    <span class="row-value" id="admAnggota">Rp 0</span>
  </div>
  <div class="row subtotal">
    <span>Total Pendapatan</span>
    <span id="totalPendapatan">Rp 0</span>
  </div>
</div>

<div class="card">
  <h2>💸 BEBAN OPERASIONAL</h2>
  <div id="listBeban"></div>
  <div class="row subtotal">
    <span>Total Beban</span>
    <span id="totalBeban">Rp 0</span>
  </div>
</div>

<div class="shu-box" id="shuBox">
  SHU: Rp 0
</div>

<script>


const firebaseConfig = {
  apiKey: "AIzaSyDd0s73-qW2uiOlBWR-afybFZzMafCHeSo",
  authDomain: "arfa-c7dee.firebaseapp.com",
  databaseURL: "https://arfa-c7dee-default-rtdb.firebaseio.com",
  projectId: "arfa-c7dee"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function rupiah(n){ 
  return "Rp " + Number(n || 0).toLocaleString("id-ID"); 
}

function kembali(){ 
  window.history.back(); 
}

let dataGlobal = {};

const now = new Date();
document.getElementById("bulan").value = now.getMonth();
document.getElementById("tahun").value = now.getFullYear();

document.getElementById("bulan").onchange = hitungLabaRugi;
document.getElementById("tahun").oninput = hitungLabaRugi;

db.ref("/").on("value", snap=>{
  dataGlobal = snap.val() || {};
  hitungLabaRugi();
});

function hitungLabaRugi(){

  const bulan = Number(document.getElementById("bulan").value);
  const tahun = Number(document.getElementById("tahun").value);

  const startDate = new Date(tahun, bulan, 1, 0,0,0).getTime();
  const endDate   = new Date(tahun, bulan + 1, 0, 23,59,59).getTime();

// =====================================================
// 1. HITUNG JASA PINJAMAN (SHU)
// =====================================================

let jasaPinjaman = 0;

const angsuran = dataGlobal.angsuran || {};

Object.values(angsuran).forEach(a=>{

  let tgl = 0;

  if(typeof a.tanggal === "number"){
    tgl = a.tanggal;
  }else if(a.tanggal){
    tgl = new Date(a.tanggal).getTime();
  }

  if(tgl >= startDate && tgl <= endDate){

    let jasa = Number(a.jasa) || 0;

    jasaPinjaman += jasa;
  }
});
  // =====================================================
  // 2. ADM ANGGOTA BARU
  // =====================================================

  let admAnggota = 0;

  const simpanan = dataGlobal.simpanan || {};

  Object.values(simpanan).forEach(s=>{

    let tgl = 0;

    if(typeof s.tanggal === "number"){
      tgl = s.tanggal;
    }else if(s.tanggal){
      tgl = new Date(s.tanggal).getTime();
    }

    if(
      tgl >= startDate &&
      tgl <= endDate &&
      (
        s.jenis === "pokok" ||
        s.jenis === "Simpanan Pokok"
      )
    ){
      admAnggota += Number(s.jumlah) || 0;
    }
  });

  const totalPendapatan = jasaPinjaman + admAnggota;

  // =====================================================
  // 3. HITUNG BEBAN
  // =====================================================

  const kas = dataGlobal.kas?.transaksi || 
              dataGlobal.kas || 
              dataGlobal.transaksi || {};

  let bebanMap = {};
  let totalBeban = 0;

  Object.values(kas).forEach(t=>{

    let tgl = 0;

    if(typeof t.tanggal === "number"){
      tgl = t.tanggal;
    }else if(t.tanggal){
      tgl = new Date(t.tanggal).getTime();
    }

    const tipe = (t.tipe || "").toLowerCase();
    const kategori = (t.kategori || "").toLowerCase();

    const isBeban =
      tipe === "biaya" ||
      tipe === "pengeluaran" ||
      kategori === "operasional";

    if(tgl >= startDate && tgl <= endDate && isBeban){

      const kat = kategori || "lain";
      const jumlah = Number(t.jumlah) || 0;

      bebanMap[kat] = (bebanMap[kat] || 0) + jumlah;

      totalBeban += jumlah;
    }
  });

  // =====================================================
  // 4. RENDER
  // =====================================================

  document.getElementById("jasaPinjaman").innerText =
    rupiah(jasaPinjaman);

  document.getElementById("admAnggota").innerText =
    rupiah(admAnggota);

  document.getElementById("totalPendapatan").innerText =
    rupiah(totalPendapatan);

  const listBeban = document.getElementById("listBeban");

  listBeban.innerHTML = "";

  const labelKategori = {
    gaji: "Gaji Pengurus",
    listrik: "Listrik & Air",
    atk: "ATK & Fotocopy",
    transport: "Transport",
    konsumsi: "Konsumsi Rapat",
    lain: "Lain-lain"
  };

  Object.entries(bebanMap).forEach(([kat, jml])=>{

    listBeban.innerHTML += `
      <div class="row indent">
        <span class="row-label">
          ${labelKategori[kat] || kat}
        </span>
        <span class="row-value">
          ${rupiah(jml)}
        </span>
      </div>
    `;
  });

  if(Object.keys(bebanMap).length === 0){

    listBeban.innerHTML = `
      <div class="row indent">
        <span class="row-label">Belum ada beban</span>
        <span class="row-value">Rp 0</span>
      </div>
    `;
  }

  document.getElementById("totalBeban").innerText =
    rupiah(totalBeban);

  // =====================================================
  // 5. SHU
  // =====================================================

  const shu = totalPendapatan - totalBeban;

  const shuBox = document.getElementById("shuBox");

  shuBox.innerText = `SHU: ${rupiah(shu)}`;

  shuBox.className =
    shu >= 0
      ? "shu-box"
      : "shu-box minus";

  document.getElementById("tglLaporan").innerText =
    `Periode ${new Date(tahun, bulan)
      .toLocaleDateString("id-ID",{
        month:"long",
        year:"numeric"
      })}`;
}
</script>
</body>
</html>
